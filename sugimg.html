        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .image-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            overflow-y: auto;
            height: 80vh;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 10px;
            animation: rgbBorder 5s infinite;
        }
        .image-box-wrapper {
            position: relative;
            width: 90%;
            max-width: 800px;
            margin-bottom: 20px;
            text-align: left;
        }
        .image-box {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
            border: 1px solid #ccc;
        }
        .buttons {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
        }
        .button {
            background: white;
            color: #007BFF;
            border: 2px solid #007BFF;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }
        .button:hover {
            background: #007BFF;
            color: white;
            border-color: #0056b3;
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.6);
        }
        .button i {
            font-size: 20px;
        }
        /* RGB Border Animation */
        @keyframes rgbBorder {
            0% { border-color: red; }
            33% { border-color: green; }
            66% { border-color: blue; }
            100% { border-color: red; }
        }
        @media (max-width: 768px) {
            .image-box-wrapper {
                width: 100%;
            }
        }
    </style>

    <script>
        function downloadImage(imageSrc) {
            const link = document.createElement('a');
            link.href = imageSrc;
            link.download = imageSrc;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        function rotateImage(imageId) {
            const img = document.querySelector(`img[src="${imageId}"]`);
            const currentRotation = img.dataset.rotation ? parseInt(img.dataset.rotation) : 0;
            const newRotation = currentRotation + 90;
            img.style.transform = `rotate(${newRotation}deg)`;
            img.dataset.rotation = newRotation;
        }
        function flipImage(imageId) {
            const img = document.querySelector(`img[src="${imageId}"]`);
            const currentScale = img.dataset.scaleX ? parseInt(img.dataset.scaleX) : 1;
            const newScale = currentScale * -1;
            img.style.transform = `scaleX(${newScale})`;
            img.dataset.scaleX = newScale;
        }
        function toggleFullScreen(imageId) {
            const img = document.querySelector(`img[src="${imageId}"]`);
            if (!document.fullscreenElement) {
                img.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        }
    </script>
