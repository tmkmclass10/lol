    <style>
        .gallery-container {
            padding: 30px;
            background-color: #1d3557;
            color: white;
            min-height: calc(100vh - 100px); 
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .gallery-heading {
            font-size: 2.8rem;
            color: #f4a261;
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }

        .gallery-item {
            width: 500px;
            height: 300px;
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }

        .background-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
    </style>
